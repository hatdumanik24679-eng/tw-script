         $('#headlessui-listbox-button-1').on('click',function(){

         $('#headlessui-listbox-button-1').attr('aria-expanded','true');
         }
         else{
         $('#headlessui-listbox-options-5').hide();
         $('#headlessui-listbox-button-1').attr('aria-expanded','false');
         }
         });
         $('.select-none').on('click',function(){ 
         
         
         $('#headlessui-listbox-options-5').hide();
         $('#headlessui-listbox-button-1').attr('aria-expanded','false');
         if ($(this).attr('aria-selected')=='false') {
         if ($('#headlessui-listbox-button-1').attr('aria-seed')==12) {
         	$('#headlessui-listbox-button-1').attr('aria-seed','24');
         	$('span:first', '#headlessui-listbox-button-1').text('I have a 24 word Secret Phrase');
         	$('p','#headlessui-listbox-option-6').removeClass('text-primary');
         	$('p','#headlessui-listbox-option-6').addClass('text-textPrimary');
         	$('#headlessui-listbox-option-6').attr('aria-selected','false');
         	$('#scheck12').hide();
         	$('#scheck24').show();
         	
         	$('#ps1').removeClass('md:max-w-[438px]');
         	$('#ps2').addClass('max-w-[800px] mx-auto');
         	$('#ps3').removeClass('md:max-w-[438px]');

         	$('#ps4').addClass('grid-cols-4');
         	$('#ps5').show();
         	$('#ps6').show();
         	inputValidate();
         
         }
         else {
         	$('#headlessui-listbox-button-1').attr('aria-seed','12');
         	$('span:first', '#headlessui-listbox-button-1').text('I have a 12 word Secret Phrase');
         	$('p','#headlessui-listbox-option-7').removeClass('text-primary');
         	$('p','#headlessui-listbox-option-7').addClass('text-textPrimary');
         	$('#headlessui-listbox-option-7').attr('aria-selected','false');
         	$('#scheck24').hide();
         	$('#scheck12').show();
         	
         	$('#ps1').addClass('md:max-w-[438px]');
         	$('#ps2').removeClass('max-w-[800px] mx-auto');
         	$('#ps3').addClass('md:max-w-[438px]');
         	$('#ps4').removeClass('grid-cols-4');
         	$('#ps4').addClass('grid-cols-2');
         	$('#ps5').hide();
         	$('#ps6').hide();
         	inputValidate();
         	}
         $(this).attr('aria-selected','true');
         $(this).attr('data-headlessui-state','active selected');
         $('p',this).removeClass('text-textPrimary');

         }
